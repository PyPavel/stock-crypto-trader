services:
  trader:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - trader-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - ollama
    command: python -m trader --config config.yaml --db /app/data/trader.db
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

volumes:
  trader-data:
  ollama-models:
