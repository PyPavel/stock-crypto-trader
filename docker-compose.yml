services:
  trader:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml
      - trader-data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: python -m trader --config config.yaml --db /app/data/trader.db
    restart: unless-stopped

  trader-stocks:
    build: .
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./config-stocks.yaml:/app/config.yaml
      - stocks-data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: python -m trader --config config.yaml --db /app/data/stocks.db
    restart: unless-stopped

  trader-tastytrade:
    build: .
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - ./config-tastytrade.yaml:/app/config.yaml
      - tastytrade-data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: python -m trader --config config.yaml --db /app/data/tastytrade.db
    restart: unless-stopped

volumes:
  trader-data:
  stocks-data:
  tastytrade-data:
